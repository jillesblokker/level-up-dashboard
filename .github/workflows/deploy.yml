name: Build & Deploy to VPS

on:
  push:
    branches: [main, development]

concurrency:
  group: production_deployment
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Verify Environment Secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then echo "::error::SSH KEY MISSING!"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "::error::SECRET MISSING: SERVICE_ROLE"; exit 1; fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        run: |
          echo "Starting Next.js Build..."
          pnpm build > build.log 2>&1 || { 
            echo "::error::BUILD FAILED! Showing log summary below:";
            tail -n 50 build.log; 
            exit 1; 
          }
        env:
          NODE_ENV: production
          CI: false
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_SUPABASE_URL: "https://uunfpqrauivviygysjzj.supabase.co"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_live_Y2xlcmsuamlsbGVzYmxva2tlci5jb20k"
          NEXT_PUBLIC_CLERK_FRONTEND_API: "clerk.jillesblokker.com"
          CLERK_ALLOWED_ORIGINS: "http://localhost:3005,https://lvlup.jillesblokker.com"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          ssh-keyscan -H 165.232.86.194 >> ~/.ssh/known_hosts

      - name: Prepare and TAR standalone bundle
        run: |
          if [ -d ".next/standalone" ]; then
            cp -r public .next/standalone/
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/
            
            # Absolute bundling
            cd .next/standalone && tar -czf ../../deploy.tar.gz . && cd ../..
          else
            echo "::error::STANDALONE ERROR: Build output missing."
            exit 1
          fi

      - name: Send Snapshot to server
        timeout-minutes: 3
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar.gz root@165.232.86.194:/tmp/deploy.tar.gz

      - name: Deploy to server
        timeout-minutes: 5
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            root@165.232.86.194 'bash -s' << 'DEPLOY_SCRIPT'
              # Stop existing processes - use timeout to prevent hangs
              pm2 delete level-up 2>/dev/null || true
              # DO NOT use pm2 kill. Killing the PM2 daemon forces it to respawn, which hangs SSH!
              pkill -f "node.*server.js" 2>/dev/null || true
              sleep 2
              
              # Deploy new files
              mkdir -p /var/www/level-up
              # Specifically delete the hidden .next folder which isn't caught by the * wildcard
              rm -rf /var/www/level-up/.next
              rm -rf /var/www/level-up/*
              tar -xzf /tmp/deploy.tar.gz -C /var/www/level-up
              chmod -R 755 /var/www/level-up
              
              # Verify server.js exists
              if [ ! -f /var/www/level-up/server.js ]; then
                echo "FATAL: server.js NOT IN ROOT"
                ls -la /var/www/level-up
                exit 1
              fi
              
              # Fix nginx port
              find /etc/nginx/sites-enabled/ -type f -exec sed -i 's/:3000/:3005/g' {} + 2>/dev/null || true
              nginx -t && systemctl reload nginx || true
          DEPLOY_SCRIPT

      - name: Create PM2 ecosystem config
        timeout-minutes: 2
        run: |
          # Write ecosystem.json for PM2 to natively handle environment variables
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@165.232.86.194 'bash -s' << SETUP_SCRIPT
            cat > /var/www/level-up/ecosystem.json << 'ECOSYSTEM'
          {
            "apps": [{
              "name": "level-up",
              "script": "server.js",
              "cwd": "/var/www/level-up",
              "env": {
                "PORT": 3005,
                "HOSTNAME": "0.0.0.0",
                "NODE_ENV": "production",
                "NEXT_PUBLIC_SUPABASE_URL": "https://uunfpqrauivviygysjzj.supabase.co",
                "NEXT_PUBLIC_SUPABASE_ANON_KEY": "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}",
                "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY": "pk_live_Y2xlcmsuamlsbGVzYmxva2tlci5jb20k",
                "NEXT_PUBLIC_CLERK_FRONTEND_API": "clerk.jillesblokker.com",
                "CLERK_SECRET_KEY": "${{ secrets.CLERK_SECRET_KEY }}",
                "SUPABASE_SERVICE_ROLE_KEY": "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
              }
            }]
          }
          ECOSYSTEM
            echo "Setup complete: ecosystem.json created"
          SETUP_SCRIPT

      - name: Start PM2 app
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@165.232.86.194 \
            'cd /var/www/level-up && pm2 start ecosystem.json && pm2 save --force'
          echo "=== PM2 app started successfully ==="

      - name: Verify app is healthy
        timeout-minutes: 5
        run: |
          echo "Waiting for Next.js to boot (45s)..."
          sleep 45
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@165.232.86.194 \
            'echo "--- PM2 STATUS ---"; pm2 list; echo "--- PM2 LOGS ---"; pm2 logs level-up --lines 30 --nostream 2>/dev/null || true; echo "--- HEALTH CHECK ---"; curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:3005 && echo " — PASSED" || { echo "::error::HEALTH CHECK FAILED — port 3005 not responding"; exit 1; }'

