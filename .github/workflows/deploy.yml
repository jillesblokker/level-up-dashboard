name: Build & Deploy to VPS

on:
  push:
    branches: [main, development]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Verify Environment Secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then echo "::error::SSH KEY MISSING!"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "::error::SECRET MISSING: SERVICE_ROLE"; exit 1; fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        run: |
          echo "Starting Next.js Build..."
          pnpm build > build.log 2>&1 || { 
            echo "::error::BUILD FAILED! Showing log summary below:";
            tail -n 50 build.log; 
            exit 1; 
          }
        env:
          NODE_ENV: production
          CI: false
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_SUPABASE_URL: "https://uunfpqrauivviygysjzj.supabase.co"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_live_Y2xlcmsuamlsbGVzYmxva2tlci5jb20k"
          NEXT_PUBLIC_CLERK_FRONTEND_API: "clerk.jillesblokker.com"
          CLERK_ALLOWED_ORIGINS: "http://localhost:3005,https://lvlup.jillesblokker.com"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          ssh-keyscan -H 165.232.86.194 >> ~/.ssh/known_hosts

      - name: Prepare and TAR standalone bundle
        run: |
          if [ -d ".next/standalone" ]; then
            cp -r public .next/standalone/
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/
            
            # Absolute bundling
            cd .next/standalone && tar -czf ../../deploy.tar.gz . && cd ../..
          else
            echo "::error::STANDALONE ERROR: Build output missing."
            exit 1
          fi

      - name: Send Snapshot to server
        timeout-minutes: 3
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar.gz root@165.232.86.194:/tmp/deploy.tar.gz

      - name: Deploy to server
        timeout-minutes: 5
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            root@165.232.86.194 "
              pm2 delete level-up 2>/dev/null || true
              pm2 kill 2>/dev/null || true
              pkill -u root node 2>/dev/null || true
              sleep 2
              mkdir -p /var/www/level-up
              rm -rf /var/www/level-up/*
              tar -xzf /tmp/deploy.tar.gz -C /var/www/level-up
              chmod -R 755 /var/www/level-up
              if [ ! -f /var/www/level-up/server.js ]; then echo 'FATAL: server.js NOT IN ROOT'; ls -la /var/www/level-up; exit 1; fi
              find /etc/nginx/sites-enabled/ -type f -exec sed -i 's/:3000/:3005/g' {} + 2>/dev/null || true
              nginx -t && systemctl reload nginx || true
            "

      - name: Start PM2 app
        timeout-minutes: 5
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            root@165.232.86.194 \
            'cd /var/www/level-up && \
             (PORT=3005 \
             HOSTNAME=0.0.0.0 \
             NEXT_PUBLIC_SUPABASE_URL="https://uunfpqrauivviygysjzj.supabase.co" \
             NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
             NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="pk_live_Y2xlcmsuamlsbGVzYmxva2tlci5jb20k" \
             NEXT_PUBLIC_CLERK_FRONTEND_API="clerk.jillesblokker.com" \
             CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
             SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
             pm2 start server.js --name level-up --update-env > /dev/null 2>&1 &) && \
             sleep 5 && \
             pm2 save --force'

      - name: Verify app is healthy
        timeout-minutes: 5
        run: |
          echo "Waiting for Next.js to boot (30s)..."
          sleep 30
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            root@165.232.86.194 \
            'curl -vf http://127.0.0.1:3005/api/health 2>&1 || (echo "::error::HEALTH CHECK FAILED"; pm2 logs level-up --lines 100 --nostream; exit 1)'
