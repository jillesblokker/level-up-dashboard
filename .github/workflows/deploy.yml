name: Build & Deploy to VPS

on:
  push:
    branches: [main, development]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify Environment Secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then echo "::error::SSH KEY MISSING!"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "::error::SECRET MISSING: SERVICE_ROLE"; exit 1; fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        run: |
          echo "Starting Next.js Build..."
          pnpm build > build.log 2>&1 || { 
            echo "::error::BUILD FAILED! Showing log summary below:";
            tail -n 50 build.log; 
            exit 1; 
          }
        env:
          NODE_ENV: production
          CI: false
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_SUPABASE_URL: "https://uunfpqrauivviygysjzj.supabase.co"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_live_Y2xlcmsuamlsbGVzYmxva2tlci5jb20k"
          NEXT_PUBLIC_CLERK_FRONTEND_API: "clerk.jillesblokker.com"
          CLERK_ALLOWED_ORIGINS: "http://localhost:3005,https://lvlup.jillesblokker.com"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          ssh-keyscan -H 165.232.86.194 >> ~/.ssh/known_hosts

      - name: Prepare and TAR standalone bundle
        run: |
          # The Snapshot method: Pack everything into one file to avoid rsync errors
          if [ -d ".next/standalone" ]; then
            cp -r public .next/standalone/
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/
            # Go inside standalone and tar it up
            cd .next/standalone
            tar -czf ../../deploy.tar.gz .
            cd ../..
          else
            echo "::error::STANDALONE ERROR: Build output missing."
            exit 1
          fi

      - name: Send Snapshot to server
        run: |
          # Send the single file instead of thousands
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar.gz root@165.232.86.194:/tmp/deploy.tar.gz

      - name: Extract and Restart on server
        run: |
          # Wipe old files, extract snapshot, fix nginx and restart PM2
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@165.232.86.194 "
            mkdir -p /var/www/level-up && 
            rm -rf /var/www/level-up/* && 
            tar -xzf /tmp/deploy.tar.gz -C /var/www/level-up && 
            chmod -R 755 /var/www/level-up && 
            sed -i 's/localhost:3000/localhost:3005/g' /etc/nginx/sites-available/default 2>/dev/null || true && 
            sed -i 's/127.0.0.1:3000/127.0.0.1:3005/g' /etc/nginx/sites-available/default 2>/dev/null || true && 
            (nginx -t && systemctl reload nginx || true) && 
            cd /var/www/level-up && 
            pm2 delete level-up || true && 
            PORT=3005 HOSTNAME=0.0.0.0 pm2 start server.js --name level-up
          "

      - name: Verify deployment
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@165.232.86.194 "pm2 status"
