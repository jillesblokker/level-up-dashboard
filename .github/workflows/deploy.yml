name: Build & Deploy to VPS

on:
  push:
    branches: [main, development]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify Environment Secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then 
            echo "::error::DEPLOYMENT ERROR: VPS_SSH_KEY secret is missing! Go to Settings > Secrets and variables > Actions in your repo and add it."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        run: |
          echo "Starting Next.js Build..."
          pnpm build || { echo "::error::BUILD ERROR: Next.js build failed. Click 'deploy' to see the logs for syntax or typescript errors."; exit 1; }
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 165.232.86.194 >> ~/.ssh/known_hosts

      - name: Prepare standalone files
        run: |
          if [ -d ".next/standalone" ]; then
            cp -r public .next/standalone/
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/
          else
            echo "::error::STANDALONE ERROR: .next/standalone folder not found. Ensure output: 'standalone' is in next.config.mjs."
            exit 1
          fi

      - name: Sync built app to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.env' \
            .next/standalone/ root@165.232.86.194:/var/www/level-up/ || { echo "::error::SYNC ERROR: Failed to upload files to VPS. Check VPS_SSH_KEY and IP address."; exit 1; }

      - name: Restart PM2 on server
        run: |
          ssh -i ~/.ssh/deploy_key root@165.232.86.194 "cd /var/www/level-up && PORT=3005 pm2 start server.js --name level-up || pm2 restart level-up" || { echo "::error::PM2 ERROR: Failed to restart app on server."; exit 1; }

      - name: Verify deployment
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key root@165.232.86.194 "pm2 status"
